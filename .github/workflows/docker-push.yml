name: Build and Push Docker Image to Aliyun ACR

on:
  push:
    branches: [ main ]
    # 监听Dockerfile和配置文件的变更（修改配置文件也触发构建）
    paths: [ 'Dockerfile', 'docker-build.config' ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      # 1. 检出仓库代码（包含Dockerfile和配置文件）
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 读取配置文件，设置为环境变量（核心步骤）
      - name: Load custom config
        run: |
          # 读取配置文件中的镜像名和版本号
          source ./docker-build.config
          # 将配置写入环境变量，供后续步骤使用
          echo "IMAGE_NAME=$IMAGE_NAME" >> $GITHUB_ENV
          # 若版本号为空，用Git提交SHA填充；否则用配置文件中的版本号
          if [ -z "$IMAGE_TAG" ]; then
            echo "IMAGE_TAG=${{ github.sha }}" >> $GITHUB_ENV
          else
            echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV
          fi

      # 3. 配置Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 4. 登录阿里云ACR
      - name: Login to Aliyun ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.ALIYUN_REGISTRY }}
          username: ${{ secrets.ALIYUN_REGISTRY_USER }}
          password: ${{ secrets.ALIYUN_REGISTRY_PASSWORD }}

      # 5. 构建并推送镜像（使用配置文件的镜像名/版本号）
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # 拼接完整镜像地址：ACR域名/命名空间/镜像名:版本号
          tags: |
            ${{ vars.ALIYUN_REGISTRY }}/${{ vars.ALIYUN_NAME_SPACE }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
            # 额外推送latest标签（可选，方便使用最新版）
            ${{ vars.ALIYUN_REGISTRY }}/${{ vars.ALIYUN_NAME_SPACE }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
