name: Build and Push Docker Image to Aliyun ACR

on:
  push:
    branches: [ main ]
    paths: [ 'Dockerfile', 'docker-build.config' ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      # 1. 检出仓库代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 读取配置文件，设置环境变量
      - name: Load custom config
        run: |
          source ./docker-build.config
          echo "IMAGE_NAME=$IMAGE_NAME" >> $GITHUB_ENV
          if [ -z "$IMAGE_TAG" ]; then
            echo "IMAGE_TAG=${{ github.sha }}" >> $GITHUB_ENV
          else
            echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV
          fi

      # 3. 配置Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 4. 登录阿里云ACR（关键修复：补全registry参数）
      - name: Login to Aliyun ACR
        uses: docker/login-action@v3
        with:
          # ✅ 核心修复：指定阿里云ACR的仓库地址，不再默认登录Docker Hub
          registry: ${{ vars.ALIYUN_REGISTRY }}
          username: ${{ secrets.ALIYUN_REGISTRY_USER }}
          password: ${{ secrets.ALIYUN_REGISTRY_PASSWORD }}
          logout: true

      # 5. 构建并推送镜像
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ vars.ALIYUN_REGISTRY }}/${{ vars.ALIYUN_NAME_SPACE }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
            ${{ vars.ALIYUN_REGISTRY }}/${{ vars.ALIYUN_NAME_SPACE }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
